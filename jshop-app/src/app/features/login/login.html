<div class="login-bg">
  <!-- Floating orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="login-card">
    <!-- Logo / Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="18" stroke="url(#g)" stroke-width="2.5"/>
          <path d="M13 20h14M20 13v14" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
          <defs>
            <linearGradient id="g" x1="2" y1="2" x2="38" y2="38" gradientUnits="userSpaceOnUse">
              <stop stop-color="#4f6af0"/>
              <stop offset="1" stop-color="#7b5ea7"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1>jShop</h1>
      <p class="tagline">Warehouse Management System</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" autocomplete="off" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 10a4 4 0 100-8 4 4 0 000 8zm-7 8a7 7 0 1114 0H3z"/></svg>
          </span>
          <input
            id="username"
            type="text"
            [(ngModel)]="username"
            name="username"
            placeholder="Enter username"
            autocomplete="username"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"/></svg>
          </span>
          <input
            id="password"
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Enter password"
            autocomplete="current-password"
          />
        </div>
      </div>

      @if (error()) {
        <div class="error-msg">{{ error() }}</div>
      }

      <button type="submit" class="btn-login" [class.loading]="loading()" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner"></span>
          <span>Signing In…</span>
        } @else {
          <span>Sign In</span>
        }
      </button>
    </form>

    <p class="hint">Demo: enter any username & password</p>
  </div>
</div>
